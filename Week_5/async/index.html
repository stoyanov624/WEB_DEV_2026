<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarWarsing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
    <script src="scripts/header.js" defer></script>
    <script src="scripts/search.js" defer></script>
  </head>
  <body>
    <div class="wrapper">
      <header class="flex-header">
        <div class="header-home">
          <img class="small-image" src="assets/stormtrooper.png" alt="" />
          <h2>StarWarsing</h2>
        </div>
        <ul id="header-list" class="header-list">
          <li><a class="active-list-item" href="#">People</a></li>
          <li><a href="#">Planets</a></li>
          <li><a href="#">Starships</a></li>
          <li><a href="#">Planets</a></li>
        </ul>
      </header>
      <main>
        <div class="search-container">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search for Star Wars characters..."
          />
          <div class="paging">
            <button id="prevBtn" class="page-btn" disabled>&lt;</button>
            <span id="pageInfo" class="page-info">1/1</span>
            <button id="nextBtn" class="page-btn" disabled>&gt;</button>
          </div>
          <button id="searchBtn" class="search-btn">Search</button>
        </div>
        <div id="loading" class="loading" style="display: none">
          Searching the galaxy...
        </div>
        <div id="error" class="error" style="display: none"></div>
        <div id="results" class="cards-container"></div>
      </main>
      <footer></footer>
    </div>
  </body>
</html>
